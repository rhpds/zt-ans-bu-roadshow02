---
# validation.yml — Module 02: Active Directory Domain Management

# Check Windows Users and OU job
- name: Get Windows Users and OU template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Windows+Users+and+OU"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wuo
  failed_when: false

- name: Get Windows Users and OU jobs
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_wuo.json.results[0].id }}/jobs/?order_by=-finished&page_size=10"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wuo_jobs
  failed_when: false
  when: r_wuo.json is defined and r_wuo.json.count | default(0) > 0

# Check Windows Join Domain job
- name: Get Windows Join Domain template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Windows+Join+Domain"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wjd
  failed_when: false

- name: Get Windows Join Domain jobs
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_wjd.json.results[0].id }}/jobs/?order_by=-finished&page_size=10"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wjd_jobs
  failed_when: false
  when: r_wjd.json is defined and r_wjd.json.count | default(0) > 0

# Check RHEL Join AD survey and job
- name: Get RHEL Join AD template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=RHEL+Join+AD"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_rjad
  failed_when: false

- name: Get RHEL Join AD survey spec
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_rjad.json.results[0].id }}/survey_spec/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_rjad_survey
  failed_when: false
  when: r_rjad.json is defined and r_rjad.json.count | default(0) > 0

- name: Get RHEL Join AD template details
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_rjad.json.results[0].id }}/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_rjad_detail
  failed_when: false
  when: r_rjad.json is defined and r_rjad.json.count | default(0) > 0

- name: Get RHEL Join AD jobs
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_rjad.json.results[0].id }}/jobs/?order_by=-finished&page_size=10"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_rjad_jobs
  failed_when: false
  when: r_rjad.json is defined and r_rjad.json.count | default(0) > 0

# Evaluate results
- name: Set validation results
  ansible.builtin.set_fact:
    wuo_ok: >-
      {{ r_wuo.json is defined and r_wuo.json.count | default(0) > 0
         and r_wuo_jobs is defined and r_wuo_jobs is not skipped
         and (r_wuo_jobs.json.results | default([]) | selectattr('status', 'equalto', 'successful') | list | length > 0) }}
    wjd_ok: >-
      {{ r_wjd.json is defined and r_wjd.json.count | default(0) > 0
         and r_wjd_jobs is defined and r_wjd_jobs is not skipped
         and (r_wjd_jobs.json.results | default([]) | selectattr('status', 'equalto', 'successful') | list | length > 0) }}
    survey_ok: >-
      {{ r_rjad.json is defined and r_rjad.json.count | default(0) > 0
         and r_rjad_survey is defined and r_rjad_survey is not skipped
         and (r_rjad_survey.json.spec | default([]) | selectattr('variable', 'equalto', 'domain') | list | length > 0) }}
    survey_enabled_ok: >-
      {{ r_rjad.json is defined and r_rjad.json.count | default(0) > 0
         and r_rjad_detail is defined and r_rjad_detail is not skipped
         and (r_rjad_detail.json.survey_enabled | default(false)) }}
    rjad_ok: >-
      {{ r_rjad.json is defined and r_rjad.json.count | default(0) > 0
         and r_rjad_jobs is defined and r_rjad_jobs is not skipped
         and (r_rjad_jobs.json.results | default([]) | selectattr('status', 'equalto', 'successful') | list | length > 0) }}

- name: Set validation output
  ansible.builtin.set_fact:
    validation_output: |
      Module 2 Validation
      ===================
      {{ '[OK]' if wuo_ok | bool else '[X] ' }} Windows Users and OU job launched
      {{ '[OK]' if wjd_ok | bool else '[X] ' }} Windows Join Domain job launched
      {{ '[OK]' if survey_ok | bool else '[X] ' }} Survey created on RHEL Join AD
      {{ '[OK]' if survey_enabled_ok | bool else '[X] ' }} Survey enabled on RHEL Join AD
      {{ '[OK]' if rjad_ok | bool else '[X] ' }} RHEL Join AD job launched
    validation_passed: >-
      {{ wuo_ok | bool and wjd_ok | bool and survey_ok | bool and survey_enabled_ok | bool and rjad_ok | bool }}

- name: Show validation results
  ansible.builtin.debug:
    msg: "{{ validation_output }}"

- name: Write failure details
  ansible.builtin.copy:
    content: "{{ validation_output }}"
    dest: "{{ job_info_dir }}/validation_failure.out"
  delegate_to: localhost
  when:
    - job_info_dir is defined
    - not validation_passed | bool

- name: Fail if not passed
  ansible.builtin.fail:
    msg: "{{ validation_output }}"
  when: not validation_passed | bool
