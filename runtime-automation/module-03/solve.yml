---
# solve.yml — Module 03: Web Application Deployment and Load Balancing

# Resolve DNS domain for loadbalancer hostnames
- name: Get DNS domain
  ansible.builtin.set_fact:
    dns_domain: "{{ lookup('pipe', 'grep ^search /etc/resolv.conf | awk \"{print $2}\"') | default('') }}"

# Step 1: Launch "Windows Deploy WebApp"
- name: Get Windows Deploy WebApp template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Windows+Deploy+WebApp"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wdwa

- name: Launch Windows Deploy WebApp
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_wdwa.json.results[0].id }}/launch/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: {}
    status_code: [200, 201]
  register: r_launch_wdwa

- name: Wait for Windows Deploy WebApp
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/jobs/{{ r_launch_wdwa.json.id }}/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_job
  until: r_job.json.status in ['successful', 'failed', 'error', 'canceled']
  retries: 60
  delay: 10

- name: Warn if Windows Deploy WebApp failed
  ansible.builtin.debug:
    msg: "WARNING: Windows Deploy WebApp finished with status: {{ r_job.json.status }}"
  when: r_job.json.status != 'successful'

