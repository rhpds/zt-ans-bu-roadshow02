- name: Warn if Configure Loadbalancer (dbserver) failed
  ansible.builtin.debug:
    msg: "WARNING: Configure Loadbalancer (dbserver) finished with status: {{ r_job.json.status }}"
  when: r_job.json.status != 'successful'
