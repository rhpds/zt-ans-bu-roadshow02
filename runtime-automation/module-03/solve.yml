# Step 3: Launch "Configure Loadbalancer" with node01
- name: Get Configure Loadbalancer template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Configure+Loadbalancer"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_clb

- name: Set loadbalancer template ID
  ansible.builtin.set_fact:
    clb_id: "{{ r_clb.json.results[0].id }}"

- name: Launch Configure Loadbalancer (node01)
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ clb_id }}/launch/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      extra_vars:
        host: "node01.{{ dns_domain }}"
    status_code: [200, 201]
  register: r_launch_clb1

- name: Wait for Configure Loadbalancer (node01)
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/jobs/{{ r_launch_clb1.json.id }}/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_job
  until: r_job.json.status in ['successful', 'failed', 'error', 'canceled']
  retries: 60
  delay: 10

- name: Warn if Configure Loadbalancer (node01) failed
  ansible.builtin.debug:
    msg: "WARNING: Configure Loadbalancer (node01) finished with status: {{ r_job.json.status }}"
  when: r_job.json.status != 'successful'

# Step 4: Launch "Configure Loadbalancer" with dbserver
- name: Launch Configure Loadbalancer (dbserver)
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ clb_id }}/launch/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      extra_vars:
        host: "dbserver.{{ dns_domain }}"
    status_code: [200, 201]
  register: r_launch_clb2

- name: Wait for Configure Loadbalancer (dbserver)
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/jobs/{{ r_launch_clb2.json.id }}/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_job
