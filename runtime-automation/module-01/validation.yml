---
# validation.yml — Module 01: Standardized Environment Deployment

# Check workflow exists
- name: Get workflow template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_templates/?name=Windows+Apps+and+Settings"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wf
  failed_when: false

# Check workflow launched successfully
- name: Get workflow jobs
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_templates/{{ r_wf.json.results[0].id }}/workflow_jobs/?order_by=-finished&page_size=10"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wf_jobs
  failed_when: false
  when: r_wf.json is defined and r_wf.json.count | default(0) > 0

# Check Windows Domain Controller template has vault credential
- name: Get Windows Domain Controller template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Windows+Domain+Controller"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wdc
  failed_when: false

- name: Get WDC template details
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_wdc.json.results[0].id }}/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wdc_detail
  failed_when: false
  when: r_wdc.json is defined and r_wdc.json.count | default(0) > 0

# Check WDC job ran successfully
- name: Get WDC jobs
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_wdc.json.results[0].id }}/jobs/?order_by=-finished&page_size=10"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wdc_jobs
  failed_when: false
  when: r_wdc.json is defined and r_wdc.json.count | default(0) > 0

# Check Deploy Node ran successfully
- name: Get Deploy Node template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Deploy+Node"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_dn
  failed_when: false

- name: Get Deploy Node jobs
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_dn.json.results[0].id }}/jobs/?order_by=-finished&page_size=10"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_dn_jobs
  failed_when: false
  when: r_dn.json is defined and r_dn.json.count | default(0) > 0

# Evaluate results
- name: Set validation results
  ansible.builtin.set_fact:
    wf_exists_ok: >-
      {{ r_wf.json is defined and r_wf.json.count | default(0) > 0 }}
    wf_launched_ok: >-
      {{ r_wf.json is defined and r_wf.json.count | default(0) > 0
         and r_wf_jobs is defined and r_wf_jobs is not skipped
         and (r_wf_jobs.json.results | default([]) | selectattr('status', 'equalto', 'successful') | list | length > 0) }}
    vault_ok: >-
      {{ r_wdc.json is defined and r_wdc.json.count | default(0) > 0
         and r_wdc_detail is defined and r_wdc_detail is not skipped
         and (r_wdc_detail.json.summary_fields.credentials | default([]) | selectattr('name', 'search', '(?i)vault') | list | length > 0) }}
    wdc_ok: >-
      {{ r_wdc.json is defined and r_wdc.json.count | default(0) > 0
         and r_wdc_jobs is defined and r_wdc_jobs is not skipped
         and (r_wdc_jobs.json.results | default([]) | selectattr('status', 'equalto', 'successful') | list | length > 0) }}
    dn_ok: >-
      {{ r_dn.json is defined and r_dn.json.count | default(0) > 0
         and r_dn_jobs is defined and r_dn_jobs is not skipped
         and (r_dn_jobs.json.results | default([]) | selectattr('status', 'equalto', 'successful') | list | length > 0) }}

- name: Set validation output
  ansible.builtin.set_fact:
    validation_output: |
      Module 1 Validation
      ===================
      {{ '[OK]' if wf_exists_ok | bool else '[X] ' }} Workflow 'Windows Apps and Settings' exists
      {{ '[OK]' if wf_launched_ok | bool else '[X] ' }} Workflow launched successfully
      {{ '[OK]' if vault_ok | bool else '[X] ' }} Windows Domain Controller has vault credential
      {{ '[OK]' if wdc_ok | bool else '[X] ' }} Windows Domain Controller job launched
      {{ '[OK]' if dn_ok | bool else '[X] ' }} Deploy Node job launched
    validation_passed: >-
      {{ wf_exists_ok | bool and wf_launched_ok | bool and vault_ok | bool and wdc_ok | bool and dn_ok | bool }}

- name: Show validation results
  ansible.builtin.debug:
    msg: "{{ validation_output }}"

- name: Write failure details
  ansible.builtin.copy:
    content: "{{ validation_output }}"
    dest: "{{ job_info_dir }}/validation_failure.out"
  delegate_to: localhost
  when:
    - job_info_dir is defined
    - not validation_passed | bool

- name: Fail if not passed
  ansible.builtin.fail:
    msg: "{{ validation_output }}"
  when: not validation_passed | bool
